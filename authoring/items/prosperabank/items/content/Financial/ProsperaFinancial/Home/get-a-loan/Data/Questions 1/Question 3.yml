    - ID: "ef205dfd-6af2-4514-b694-77efa748f951"
      Hint: Answer
      Value: "Los requisitos de elegibilidad pueden variar dependiendo del tipo de préstamo que le interese. Generalmente, se consideran factores como el puntaje de crédito, los ingresos, el estado laboral y la relación deuda-ingresos. Los criterios específicos de elegibilidad se detallarán durante el proceso de solicitud."
