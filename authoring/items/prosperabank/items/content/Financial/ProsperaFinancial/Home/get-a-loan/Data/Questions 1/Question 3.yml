      Hint: Question
      Value: "¿Cuáles son los requisitos de elegibilidad para obtener un préstamo?"
    - ID: "9857f526-390f-48df-b6d1-1a97cc328e8f"
      Hint: __Version Name
      Value: AI translated
    - ID: "badd9cf9-53e0-4d0c-bcc0-2d784c282f6a"
